<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Predictor Form</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #4b5563;
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
        }
        .success {
            background-color: #ecfdf5;
            border: 1px solid #10b981;
            color: #065f46;
        }
        .error {
            background-color: #fef2f2;
            border: 1px solid #ef4444;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Predictor</h1>
        <form id="predictForm">
            <div class="form-group">
                <label for="cgpa">CGPA (0.0 - 4.0)</label>
                <input type="number" id="cgpa" name="cgpa" step="0.1" min="0" max="4" value="3.5" required>
            </div>
            <div class="form-group">
                <label for="interest">Interest</label>
                <select id="interest" name="interest" required>
                    <option value="Coding">Coding</option>
                    <option value="Design">Design</option>
                    <option value="Management">Management</option>
                    <option value="Research">Research</option>
                    <option value="Marketing">Marketing</option>
                </select>
            </div>
            <button type="submit">Predict Career</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';
            
            const cgpa = document.getElementById('cgpa').value;
            const interest = document.getElementById('interest').value;

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ cgpa, interest }),
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>Prediction:</strong> ${data.career}<br>
                        <strong>Confidence:</strong> ${(data.confidence * 100).toFixed(1)}%
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = data.error || 'An error occurred';
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = 'Failed to connect to the server';
            }
            
            resultDiv.style.display = 'block';
        });
    </script>
</body>
</html>
